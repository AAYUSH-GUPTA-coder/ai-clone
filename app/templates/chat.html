<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat with {{ name }}</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --user-bg:   #2563eb;
      --ai-bg:     #1e1e1e;
      --text:      #f0f0f0;
      --muted:     #6b7280;
      --accent:    #3b82f6;
      --radius:    18px;
      --header-h:  64px;
      --input-h:   72px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ── Header ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .75rem; padding: 0 1.25rem;
      z-index: 10;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .95rem; flex-shrink: 0; letter-spacing: .02em;
    }
    .header-info { display: flex; flex-direction: column; gap: 1px; }
    .header-name { font-weight: 600; font-size: 1rem; }
    .header-status { font-size: .75rem; color: #22c55e; display: flex; align-items: center; gap: .3rem; }
    .header-status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; }

    /* ── Message log ── */
    #log {
      position: fixed; top: var(--header-h); left: 0; right: 0; bottom: var(--input-h);
      overflow-y: auto; padding: 1.25rem 1rem;
      display: flex; flex-direction: column; gap: .5rem;
      scroll-behavior: smooth;
    }

    /* ── Bubbles ── */
    .msg-row {
      display: flex; align-items: flex-end; gap: .5rem; max-width: 100%;
      animation: fadeUp .18s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.ai    { flex-direction: row; }

    .bubble-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; flex-shrink: 0; align-self: flex-end;
    }
    .msg-row.user .bubble-avatar { display: none; }

    .bubble {
      max-width: min(72%, 560px);
      padding: .6rem .9rem;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: .93rem;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* markdown inside AI bubble */
    .bubble p     { margin: .25rem 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }
    .bubble pre   { background: rgba(255,255,255,.06); padding: .6rem .75rem; border-radius: 8px; overflow-x: auto; margin: .4rem 0; font-size: .85rem; }
    .bubble code  { background: rgba(255,255,255,.08); padding: .1rem .3rem; border-radius: 4px; font-size: .88em; }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 1.25rem; margin: .25rem 0; }
    .bubble a     { color: #93c5fd; }
    .bubble strong { color: #e5e7eb; }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex; align-items: center; gap: 4px; padding: .55rem .75rem;
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--input-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 1rem; gap: .6rem;
    }
    #msg {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 24px; padding: .6rem 1rem;
      font: inherit; font-size: .95rem; outline: none;
      transition: border-color .15s;
      resize: none; height: 44px; line-height: 1.4;
    }
    #msg:focus { border-color: var(--accent); }
    #msg::placeholder { color: var(--muted); }
    #send-btn {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover  { background: #1d4ed8; }
    #send-btn:active { transform: scale(.92); }
    #send-btn:disabled { background: var(--border); cursor: default; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Welcome message ── */
    .welcome {
      text-align: center; margin: auto; padding: 2rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: .75rem;
    }
    .welcome .big-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700;
    }
    .welcome h2 { font-size: 1.15rem; color: var(--text); }
    .welcome p  { color: var(--muted); font-size: .88rem; max-width: 280px; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="avatar" id="hdr-avatar"></div>
    <div class="header-info">
      <span class="header-name">{{ name }}</span>
      <span class="header-status">online</span>
    </div>
  </header>

  <!-- Message log -->
  <div id="log">
    <div class="welcome" id="welcome">
      <div class="big-avatar" id="welcome-avatar"></div>
      <h2>Chat with {{ name }}'s AI clone</h2>
      <p>Ask me anything — I'll answer based on what {{ name }} has shared about themselves.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <input id="msg" placeholder="Message…" autocomplete="off">
    <button id="send-btn" disabled title="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <script>
    // ── Init ──
    const NAME  = {{ name | tojson }};
    const INIT  = NAME.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();

    document.getElementById('hdr-avatar').textContent    = INIT;
    document.getElementById('welcome-avatar').textContent = INIT;

    const log     = document.getElementById('log');
    const input   = document.getElementById('msg');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');
    const history = [];
    let   busy    = false;

    // Enable send btn only when there's text and not waiting
    input.addEventListener('input', () => {
      sendBtn.disabled = !input.value.trim() || busy;
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    // ── Add a message bubble ──
    function addBubble(role, html = '') {
      welcome?.remove();

      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      if (role === 'ai') {
        const av = document.createElement('div');
        av.className = 'bubble-avatar';
        av.textContent = INIT;
        row.appendChild(av);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (html) bubble.innerHTML = html;
      row.appendChild(bubble);

      log.appendChild(row);
      scrollBottom();
      return bubble;
    }

    // ── Typing indicator ──
    function showTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row ai';
      row.id = 'typing-row';

      const av = document.createElement('div');
      av.className = 'bubble-avatar';
      av.textContent = INIT;
      row.appendChild(av);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      row.appendChild(bubble);

      log.appendChild(row);
      scrollBottom();
    }
    function hideTyping() {
      document.getElementById('typing-row')?.remove();
    }

    function scrollBottom() {
      log.scrollTop = log.scrollHeight;
    }

    // ── Send ──
    async function send() {
      const text = input.value.trim();
      if (!text || busy) return;
      busy = true;
      sendBtn.disabled = true;
      input.value = '';

      addBubble('user', escapeHtml(text));
      showTyping();

      let res;
      try {
        res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });
      } catch {
        hideTyping();
        addBubble('ai', '<em style="color:#f87171">Network error — could not reach the server.</em>');
        done(); return;
      }

      if (!res.ok || !res.body) {
        hideTyping();
        addBubble('ai', `<em style="color:#f87171">Error ${res.status}</em>`);
        done(); return;
      }

      hideTyping();
      const target = addBubble('ai');
      let acc = '';

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done: streamDone, value } = await reader.read();
        if (streamDone) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          const line = part.replace(/^data: /, '');
          if (line === '[DONE]') continue;
          try {
            const obj = JSON.parse(line);
            if (obj.token) {
              acc += obj.token;
              target.innerHTML = marked.parse(acc);
              scrollBottom();
            } else if (obj.error) {
              target.innerHTML = `<em style="color:#f87171">${escapeHtml(obj.error)}</em>`;
            }
          } catch {}
        }
      }

      if (acc) {
        history.push({ role: 'user',  content: text });
        history.push({ role: 'model', content: acc  });
      }
      done();
    }

    function done() {
      busy = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    input.focus();
  </script>
</body>
</html>
