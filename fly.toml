app = "aayush-ai-clone"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "ai_clone_data"
  destination = "/data"

[env]
  DATA_DIR  = "/data/uploads"
  CHROMA_DIR = "/data/chroma"
  # Set these as secrets (never commit them):
  # fly secrets set GEMINI_API_KEY=... APP_NAME=... ADMIN_PASSWORD=...
