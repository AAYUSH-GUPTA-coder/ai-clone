services:
  - type: web
    name: ai-clone
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: ai-clone-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # paste your key in the Render dashboard
      - key: APP_NAME
        sync: false          # your name, e.g. "Aayush Gupta"
      - key: SYSTEM_PROMPT
        sync: false          # optional, e.g. "Be concise and casual."
      - key: ADMIN_PASSWORD
        sync: false          # choose a strong password
      - key: DATA_DIR
        value: /data/uploads
      - key: CHROMA_DIR
        value: /data/chroma
