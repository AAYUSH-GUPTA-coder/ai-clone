services:
  - type: web
    name: ai-clone
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: ai-clone-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BASE_URL
        sync: false          # set this to your Render URL after first deploy
      - key: APP_SECRET
        generateValue: true  # Render generates a random value automatically
      - key: DB_PATH
        value: /data/app.db
      - key: DATA_DIR
        value: /data/uploads
      - key: CHROMA_DIR
        value: /data/chroma
